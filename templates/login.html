<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - Tesouraria ISOSED</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f4f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 10px; padding: 28px; width: 100%; max-width: 360px; box-shadow: 0 1px 6px rgba(0,0,0,0.15); text-align: center; }
  .card img.logo { width: 84px; height: 84px; margin-bottom: 10px; }
  h1 { font-size: 20px; margin: 0 0 18px; color: #1a4d8f; text-align: center; }
  label { display: block; font-size: 13px; color: #555; margin: 10px 0 4px; text-align: left; }
  input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
  button { width: 100%; background: #e8650f; color: white; border: none; padding: 10px; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 16px; }
  .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; font-size: 14px; background: #fadbd8; color: #922b21; }
</style>
</head>
<body>
<div class="card">
  <img src="{{ url_for('static', filename='icons/logo.png') }}" alt="Logo" class="logo" onerror="this.style.display='none'">
  <h1>Tesouraria ISOSED</h1>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST" autocomplete="off">
    <label>Usuário</label>
    <input type="text" name="usuario" autofocus required autocomplete="off">
    <label>Senha</label>
    <input type="password" name="senha" required autocomplete="off">
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
