{% extends "base.html" %}
{% block title %}Contas{% endblock %}
{% block content %}
<div class="card">
  <h2>Contas</h2>
  <form method="POST" class="row">
    <input type="text" name="nome" placeholder="Nome da conta" required>
    <select name="tipo" required>
      <option value="dinheiro">Dinheiro</option>
      <option value="moedas">Moedas</option>
      <option value="banco">Banco</option>
      <option value="outro">Outro</option>
    </select>
    <button type="submit">Adicionar</button>
  </form>
</div>

<div class="card">
  <table>
    <thead><tr><th>Nome</th><th>Tipo</th><th>Status</th><th>Ação</th></tr></thead>
    <tbody>
      {% for c in contas %}
      <tr>
        <td data-label="Nome">{{ c.nome }}</td>
        <td data-label="Tipo">{{ c.tipo }}</td>
        <td data-label="Status"><span class="badge {{ 'ativo' if c.ativo else 'inativo' }}">{{ 'Ativa' if c.ativo else 'Inativa' }}</span></td>
        <td data-label="Ação">
          <form method="POST" action="{{ url_for('toggle_conta', conta_id=c.id) }}">
            <button type="submit" class="secondary">{{ 'Desativar' if c.ativo else 'Ativar' }}</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
