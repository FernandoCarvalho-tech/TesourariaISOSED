{% extends "base.html" %}
{% block title %}Dizimistas{% endblock %}
{% block content %}
<div class="card">
  <h2>Cadastro de Dizimistas</h2>
  <form method="POST" class="row">
    <input type="text" name="nome" placeholder="Nome completo" required>
    <button type="submit">Adicionar</button>
  </form>
</div>

<div class="card">
  <table>
    <thead><tr><th>Nome</th><th>Status</th><th>Ação</th></tr></thead>
    <tbody>
      {% for d in dizimistas %}
      <tr>
        <td data-label="Nome">{{ d.nome }}</td>
        <td data-label="Status"><span class="badge {{ 'ativo' if d.ativo else 'inativo' }}">{{ 'Ativo' if d.ativo else 'Inativo' }}</span></td>
        <td data-label="Ação">
          <form method="POST" action="{{ url_for('toggle_dizimista', dizimista_id=d.id) }}">
            <button type="submit" class="secondary">{{ 'Desativar' if d.ativo else 'Ativar' }}</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="3">Nenhum dizimista cadastrado.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
